name: Weekly KRY Scraper

on:
  workflow_dispatch:

  schedule:
    # Runs every Sunday at 05:20 UTC.
    # In Israel: usually 07:20 winter / 08:20 summer.
    - cron: "20 5 * * 0"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          
      - name: Debug checked out code
        run: |
          echo "Current branch/ref:"
          git branch --show-current || true
          git rev-parse HEAD
          echo "Last commit:"
          git log -1 --oneline
          echo "Searching for bad Playwright usage:"
          grep -n "first()" scraper.py || true
          echo "Line 180-195:"
          nl -ba scraper.py | sed -n '180,195p'

      - name: Run scraper
        env:
          KRY_BASE_URL: "https://k-ry.org.il"
          KRY_LOGIN_URL: "https://k-ry.org.il/login.asp"
          KRY_USERNAME: ${{ secrets.KRY_USERNAME }}
          KRY_PASSWORD: ${{ secrets.KRY_PASSWORD }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          HEADLESS: "true"
        run: python scraper.py